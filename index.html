<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Клуб четырех коней</title>
    <meta
      name="description"
      content="Поддержите организацию Международного васюкинского турнира по шахматам."
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="page">
    <div class="page__scale-wrap">
      <div class="page__scale-body">
        <header class="hero" id="top">
          <div class="hero__container container">
            <a class="hero__brand" href="#top" aria-label="Клуб четырех коней">
              <img
                class="hero__brand-logo"
                src="./assets/icons/logo.svg"
                alt="Клуб четырех коней"
                width="246"
                height="36"
                fetchpriority="high"
              />
            </a>

            <div class="hero__content">
              <h1 class="hero__title">
                <span class="hero__title-line hero__title-line_left">Превратите</span>
                <span class="hero__title-line hero__title-line_left">Уездный город</span>
                <span class="hero__title-line hero__title-line_center">в столицу</span>
                <span class="hero__title-line hero__title-line_right">земного шара</span>
              </h1>

              <p class="hero__description">
                Оплатите взнос на телеграммы для&nbsp;организации Международного
                васюкинского турнира по шахматам
              </p>

              <nav class="hero__actions" aria-label="Основные действия">
                <a class="button button--theme-dark button--size-hero" href="#support">
                  Поддержать шахматную мысль
                </a>
                <a
                  class="button button--theme-light button--size-hero"
                  href="#about"
                >
                  Подробнее о турнире
                </a>
              </nav>
            </div>
          </div>
        </header>
      </div>
    </div>
  </body>
</html>
